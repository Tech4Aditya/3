<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3 Months ❤️ Aditya & Akriti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: black;
      color: white;
      overflow: hidden;
      text-align: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: 300;
      opacity: 0.8;
    }

    .counter {
      margin-top: 20px;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }

    .heart {
      color: red;
      animation: pulse 1.5s infinite;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translate(-50%, -40%);}
      to {opacity: 1; transform: translate(-50%, -50%);}
    }

    @keyframes pulse {
      0% { transform: scale(1);}
      50% { transform: scale(1.3);}
      100% { transform: scale(1);}
    }

    .message {
      margin-top: 30px;
      font-size: 1.2rem;
      max-width: 400px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="content">
  <h1>Aditya <span class="heart">❤️</span> Akriti</h1>
  <h2>3 Months of Us</h2>

  <div class="counter" id="counter"></div>

  <div class="message" id="message">
    Started with nothing. Stayed for everything.
  </div>
</div>

<script>
  // ⭐ STAR BACKGROUND
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let stars = [];

  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 1.5,
      speed: Math.random() * 0.5
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(star => {
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
      ctx.fill();

      star.y += star.speed;
      if (star.y > canvas.height) star.y = 0;
    });

    requestAnimationFrame(drawStars);
  }

  drawStars();

  // ⏳ COUNTER (SET YOUR DATE HERE)
  const startDate = new Date("2025-12-19"); // CHANGE THIS

  function updateCounter() {
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);

    document.getElementById("counter").innerHTML =
      `${days} days ${hours} hrs ${minutes} mins together`;
  }

  setInterval(updateCounter, 1000);
  updateCounter();

  // 💬 AUTO CHANGING MESSAGES
  const messages = [
    "Started with nothing. Stayed for everything.",
    "Not perfect. Still choosing you.",
    "Every day… still you.",
    "You made ordinary feel rare.",
    "3 months. And I’m not done."
  ];

  let index = 0;

  setInterval(() => {
    index = (index + 1) % messages.length;
    document.getElementById("message").innerText = messages[index];
  }, 4000);
</script>

</body>
</html>
